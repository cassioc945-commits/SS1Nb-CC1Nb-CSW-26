<h1>Entre em Contato</h1>

<form action="#" method="post">

    <!-- Nome -->
    <label for="nome">Nome completo:</label><br>
    <input type="text" id="nome" name="nome"><br><br>

    <!-- Telefone -->
    <label for="telefone">Telefone:</label><br>
    <input type="tel" id="telefone" name="telefone"><br><br>

    <!-- Email -->
    <label for="email">E-mail:</label><br>
    <input type="email" id="email" name="email"><br><br>

    <!-- Tipo de pessoa -->
    <label>Tipo de pessoa:</label><br>
    <input type="radio" name="tipo" value="fisica"> Pessoa Física<br>
    <input type="radio" name="tipo" value="juridica"> Pessoa Jurídica<br><br>

    <!-- Melhor horário -->
    <label>Melhor horário para contato:</label><br>
    <input type="checkbox" name="horario" value="manha"> Manhã<br>
    <input type="checkbox" name="horario" value="tarde"> Tarde<br>
    <input type="checkbox" name="horario" value="noite"> Noite<br><br>

    <!-- Tipo de serviço -->
    <label for="servico">Tipo de serviço:</label><br>
    <select id="servico" name="servico">
        <option>Site Estático</option>
        <option>Site Dinâmico</option>
        <option>Site Avançado</option>
    </select><br><br>

    <!-- Data -->
    <label for="data">Data desejada:</label><br>
    <input type="date" id="data" name="data"><br><br>

    <!-- Descrição -->
    <label for="descricao">Descreva o que você deseja:</label><br>
    <textarea id="descricao" name="descricao" rows="5" cols="40" placeholder="escreva sua descrição"></textarea><br><br>

    <!-- Botões -->
    <input type="submit" value="Enviar">
    <input type="reset" value="Limpar">

</form>

</body>
